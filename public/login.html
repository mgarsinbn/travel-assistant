<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Umfufu — Sign In</title>
  <link rel="icon" type="image/svg+xml" href="/eddie.svg">
  <link rel="icon" type="image/jpeg" href="/eddie.jpg">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-container {
      text-align: center;
      max-width: 420px;
      padding: 40px;
    }

    .avatar {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      border: 4px solid #ff4444;
      object-fit: cover;
      margin-bottom: 24px;
      box-shadow: 0 0 40px rgba(255, 68, 68, 0.3);
    }

    h1 {
      font-size: 36px;
      font-weight: 900;
      color: #ff4444;
      text-transform: uppercase;
      letter-spacing: 4px;
      margin-bottom: 8px;
      text-shadow: 0 0 15px rgba(255, 68, 68, 0.4);
    }

    .tagline {
      color: #888;
      font-size: 14px;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .google-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 14px 32px;
      background: white;
      color: #333;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.1s, box-shadow 0.2s;
    }

    .google-btn:hover {
      transform: scale(1.02);
      box-shadow: 0 4px 20px rgba(255, 255, 255, 0.15);
    }

    .google-btn svg {
      width: 20px;
      height: 20px;
    }

    .footer {
      margin-top: 32px;
      color: #555;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <img src="/eddie.jpg" onerror="this.src='/eddie.svg'" alt="Umfufu" class="avatar">
    <h1>Umfufu</h1>
    <p class="tagline"></p>

    <a href="/auth/google" class="google-btn">
      <svg viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Sign in with Google
    </a>

    <p class="footer">Only Mike &amp; Alexis are allowed in. Everyone else gets roasted.</p>
  </div>
</body>
</html>
