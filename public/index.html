<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Umfufu — Your Chaotic Travel Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: linear-gradient(135deg, #1a0a2e 0%, #2d1b4e 50%, #8b0000 100%);
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 2px solid #ff4444;
      box-shadow: 0 4px 20px rgba(139, 0, 0, 0.3);
    }

    .header img {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 3px solid #ff4444;
      object-fit: cover;
      box-shadow: 0 0 15px rgba(255, 68, 68, 0.5);
    }

    .header-text h1 {
      font-size: 28px;
      font-weight: 900;
      color: #ff4444;
      text-transform: uppercase;
      letter-spacing: 3px;
      text-shadow: 0 0 10px rgba(255, 68, 68, 0.5);
    }

    .header-text p {
      color: #ccc;
      font-size: 13px;
      margin-top: 2px;
      font-style: italic;
    }

    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #ccc;
    }

    .user-info img {
      width: 28px !important;
      height: 28px !important;
      border-radius: 50%;
      border: 2px solid #555 !important;
    }

    .logout-btn {
      background: transparent;
      border: 1px solid #555;
      color: #999;
      padding: 4px 12px;
      border-radius: 8px;
      font-size: 11px;
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s;
    }

    .logout-btn:hover {
      border-color: #ff4444;
      color: #ff4444;
    }

    .status-badge {
      background: #ff4444;
      color: white;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 16px;
      line-height: 1.5;
      font-size: 15px;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .message.user {
      align-self: flex-end;
      background: #2d1b4e;
      color: #e0d0ff;
      border-bottom-right-radius: 4px;
    }

    .message.assistant {
      align-self: flex-start;
      background: #1a1a2e;
      color: #e0e0e0;
      border-bottom-left-radius: 4px;
      border-left: 3px solid #ff4444;
    }

    .message.assistant .avatar-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .message.assistant .avatar-row img {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      object-fit: cover;
    }

    .message.assistant .avatar-row span {
      font-weight: 700;
      color: #ff4444;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .message.system {
      align-self: center;
      background: transparent;
      color: #666;
      font-style: italic;
      font-size: 13px;
      text-align: center;
    }

    .typing {
      align-self: flex-start;
      color: #ff4444;
      font-style: italic;
      font-size: 14px;
      padding: 8px 16px;
    }

    .typing::after {
      content: '';
      animation: dots 1.5s infinite;
    }

    @keyframes dots {
      0% { content: ''; }
      25% { content: '.'; }
      50% { content: '..'; }
      75% { content: '...'; }
    }

    .input-area {
      padding: 16px 24px;
      background: #111;
      border-top: 1px solid #333;
      display: flex;
      gap: 12px;
    }

    .input-area input {
      flex: 1;
      padding: 14px 18px;
      border-radius: 12px;
      border: 2px solid #333;
      background: #1a1a1a;
      color: #e0e0e0;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-area input:focus {
      border-color: #ff4444;
    }

    .input-area input::placeholder {
      color: #555;
    }

    .input-area button {
      padding: 14px 24px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #8b0000, #ff4444);
      color: white;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: transform 0.1s, box-shadow 0.2s;
    }

    .input-area button:hover {
      transform: scale(1.02);
      box-shadow: 0 0 15px rgba(255, 68, 68, 0.4);
    }

    .input-area button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .welcome {
      text-align: center;
      padding: 40px 20px;
    }

    .welcome img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 4px solid #ff4444;
      object-fit: cover;
      margin-bottom: 16px;
      box-shadow: 0 0 30px rgba(255, 68, 68, 0.3);
    }

    .welcome h2 {
      color: #ff4444;
      font-size: 24px;
      margin-bottom: 8px;
    }

    .welcome p {
      color: #888;
      font-size: 14px;
      max-width: 500px;
      margin: 0 auto;
      line-height: 1.6;
    }

    .capabilities {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .cap-badge {
      background: #1a1a2e;
      border: 1px solid #333;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="/eddie.jpg" onerror="this.src='/eddie.svg'" alt="Umfufu" id="header-avatar">
    <div class="header-text">
      <h1>Umfufu</h1>
      <p>Your chaotic travel & scheduling assistant</p>
    </div>
    <div class="header-right">
      <div class="user-info" id="user-info"></div>
      <a href="/auth/logout" class="logout-btn">Logout</a>
      <div class="status-badge">Online & Unhinged</div>
    </div>
  </div>

  <div class="chat-container" id="chat">
    <div class="welcome">
      <img src="/eddie.jpg" onerror="this.src='/eddie.svg'" alt="Umfufu" id="welcome-avatar">
      <h2>Umfufu is Ready</h2>
      <p>
        She books meetings, flights, and hotels with surgical precision.
        Everything else? Pure chaos. Say something.
      </p>
      <div class="capabilities">
        <span class="cap-badge">Google Calendar</span>
        <span class="cap-badge">Delta Flights</span>
        <span class="cap-badge">Marriott Hotels</span>
      </div>
    </div>
  </div>

  <div class="input-area">
    <input type="text" id="input" placeholder="Talk to Umfufu..." autofocus>
    <button id="send" onclick="sendMessage()">Send</button>
  </div>

  <script>
    const chatEl = document.getElementById('chat');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    let welcomeVisible = true;

    // Load current user info
    fetch('/api/me').then(r => r.json()).then(user => {
      const el = document.getElementById('user-info');
      if (user.picture) {
        el.innerHTML = `<img src="${user.picture}" alt="">${user.name || user.email}`;
      } else {
        el.textContent = user.email;
      }
    }).catch(() => { window.location.href = '/login'; });

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    function addMessage(text, role) {
      if (welcomeVisible) {
        const welcome = chatEl.querySelector('.welcome');
        if (welcome) welcome.remove();
        welcomeVisible = false;
      }

      const div = document.createElement('div');
      div.className = `message ${role}`;

      if (role === 'assistant') {
        div.innerHTML = `
          <div class="avatar-row">
            <img src="/eddie.jpg" onerror="this.src='/eddie.svg'" alt="Umfufu">
            <span>Umfufu</span>
          </div>
          <div>${escapeHtml(text)}</div>
        `;
      } else {
        div.textContent = text;
      }

      chatEl.appendChild(div);
      chatEl.scrollTop = chatEl.scrollHeight;
      return div;
    }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'typing';
      div.id = 'typing';
      div.textContent = 'Umfufu is cooking';
      chatEl.appendChild(div);
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    function hideTyping() {
      const el = document.getElementById('typing');
      if (el) el.remove();
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML.replace(/\n/g, '<br>');
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;

      inputEl.value = '';
      sendBtn.disabled = true;
      addMessage(text, 'user');
      showTyping();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text }),
        });

        hideTyping();

        if (!res.ok) {
          const err = await res.json();
          addMessage(`[Error: ${err.error || 'Something broke'}]`, 'system');
        } else {
          const data = await res.json();
          addMessage(data.reply, 'assistant');
        }
      } catch (err) {
        hideTyping();
        addMessage(`[Connection error: ${err.message}]`, 'system');
      }

      sendBtn.disabled = false;
      inputEl.focus();
    }
  </script>
</body>
</html>
