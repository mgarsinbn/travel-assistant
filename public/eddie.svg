<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#2d6b1e"/>
      <stop offset="100%" stop-color="#1a3d10"/>
    </radialGradient>
    <radialGradient id="skin" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#8B6914"/>
      <stop offset="100%" stop-color="#6B4F12"/>
    </radialGradient>
  </defs>

  <!-- Jungle green background -->
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>

  <!-- Big wild bush hair -->
  <ellipse cx="100" cy="65" rx="65" ry="55" fill="#1a1a1a"/>
  <ellipse cx="45" cy="70" rx="20" ry="30" fill="#1a1a1a"/>
  <ellipse cx="155" cy="70" rx="20" ry="30" fill="#1a1a1a"/>
  <ellipse cx="55" cy="45" rx="18" ry="22" fill="#222"/>
  <ellipse cx="145" cy="45" rx="18" ry="22" fill="#222"/>
  <ellipse cx="100" cy="30" rx="35" ry="20" fill="#222"/>
  <!-- Hair texture tufts -->
  <ellipse cx="70" cy="35" rx="12" ry="15" fill="#1a1a1a"/>
  <ellipse cx="130" cy="35" rx="12" ry="15" fill="#1a1a1a"/>
  <ellipse cx="40" cy="55" rx="10" ry="15" fill="#222"/>
  <ellipse cx="160" cy="55" rx="10" ry="15" fill="#222"/>
  <ellipse cx="100" cy="22" rx="20" ry="12" fill="#1a1a1a"/>

  <!-- Bone in hair -->
  <line x1="55" y1="32" x2="145" y2="32" stroke="#f5f0e0" stroke-width="5" stroke-linecap="round"/>
  <ellipse cx="55" cy="32" rx="7" ry="5" fill="#f5f0e0"/>
  <ellipse cx="145" cy="32" rx="7" ry="5" fill="#f5f0e0"/>

  <!-- Face -->
  <circle cx="100" cy="90" r="38" fill="url(#skin)"/>

  <!-- Face paint - white dots and stripes -->
  <circle cx="75" cy="80" r="3" fill="white" opacity="0.9"/>
  <circle cx="125" cy="80" r="3" fill="white" opacity="0.9"/>
  <circle cx="70" cy="90" r="2" fill="white" opacity="0.8"/>
  <circle cx="130" cy="90" r="2" fill="white" opacity="0.8"/>
  <line x1="80" y1="100" x2="75" y2="112" stroke="white" stroke-width="2" opacity="0.8"/>
  <line x1="120" y1="100" x2="125" y2="112" stroke="white" stroke-width="2" opacity="0.8"/>
  <!-- Red face paint stripes on cheeks -->
  <line x1="68" y1="85" x2="65" y2="100" stroke="#cc2200" stroke-width="2.5" opacity="0.8"/>
  <line x1="72" y1="86" x2="69" y2="101" stroke="#cc2200" stroke-width="2" opacity="0.7"/>
  <line x1="132" y1="85" x2="135" y2="100" stroke="#cc2200" stroke-width="2.5" opacity="0.8"/>
  <line x1="128" y1="86" x2="131" y2="101" stroke="#cc2200" stroke-width="2" opacity="0.7"/>

  <!-- Eyes - wide and expressive -->
  <ellipse cx="86" cy="85" rx="7" ry="6" fill="white"/>
  <circle cx="87" cy="85" r="3.5" fill="#2a1500"/>
  <circle cx="88" cy="84" r="1.5" fill="white"/>
  <ellipse cx="114" cy="85" rx="7" ry="6" fill="white"/>
  <circle cx="115" cy="85" r="3.5" fill="#2a1500"/>
  <circle cx="116" cy="84" r="1.5" fill="white"/>

  <!-- Eyebrows - thick and expressive -->
  <path d="M76,77 Q86,72 96,77" fill="none" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M104,77 Q114,72 124,77" fill="none" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Wide nose -->
  <path d="M95,90 Q93,98 88,102 Q100,105 112,102 Q107,98 105,90" fill="#7A5C10" opacity="0.4"/>

  <!-- Big goofy smile -->
  <path d="M78,105 Q100,125 122,105" fill="white" stroke="#5a4410" stroke-width="1"/>
  <path d="M78,105 Q100,100 122,105" fill="#6B4F12" stroke="none"/>

  <!-- Body - animal skin outfit -->
  <ellipse cx="100" cy="175" rx="55" ry="40" fill="#8B6914"/>
  <ellipse cx="100" cy="175" rx="55" ry="40" fill="none" stroke="#5a4410" stroke-width="1"/>
  <!-- Leopard spots on outfit -->
  <circle cx="80" cy="165" r="5" fill="#5a4410" opacity="0.6"/>
  <circle cx="120" cy="160" r="4" fill="#5a4410" opacity="0.6"/>
  <circle cx="95" cy="175" r="5" fill="#5a4410" opacity="0.5"/>
  <circle cx="110" cy="180" r="4" fill="#5a4410" opacity="0.6"/>
  <circle cx="75" cy="180" r="3" fill="#5a4410" opacity="0.5"/>
  <circle cx="130" cy="175" r="4" fill="#5a4410" opacity="0.5"/>

  <!-- Bone necklace -->
  <path d="M70,135 Q100,145 130,135" fill="none" stroke="#f5f0e0" stroke-width="2"/>
  <ellipse cx="100" cy="143" rx="6" ry="4" fill="#f5f0e0"/>
  <ellipse cx="88" cy="141" rx="4" ry="3" fill="#f5f0e0"/>
  <ellipse cx="112" cy="141" rx="4" ry="3" fill="#f5f0e0"/>
</svg>
